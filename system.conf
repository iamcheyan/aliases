# 系统工具エイリアス
if command -v eza >/dev/null 2>&1; then
    alias ls="eza --icons --group-directories-first"
    alias ll="eza -lh --icons --group-directories-first --git"
    alias la="eza -a --icons --group-directories-first"
fi
if command -v bat >/dev/null 2>&1; then
    alias cat="bat --style=plain"
elif command -v batcat >/dev/null 2>&1; then
    alias cat="batcat --style=plain"
fi
alias find="fd" 2>/dev/null
alias du="dust" 2>/dev/null
alias ps="procs" 2>/dev/null
alias top="btop" 2>/dev/null
alias ping="gping" 2>/dev/null
alias http="xh" 2>/dev/null
alias backup:config="bash ${HOME}/.dotfiles/scripts/system/backup_config.sh"
alias disk:usage="bash ${HOME}/.dotfiles/scripts/system/disk_usage.sh"
alias find:large="bash ${HOME}/.dotfiles/scripts/system/find_large_files.sh"
alias port:check="bash ${HOME}/.dotfiles/scripts/system/port_check.sh"
alias repo:size="bash ${HOME}/.dotfiles/tools/repo_size.sh"
export HISTSIZE=10000
export SAVEHIST=10000
setopt SHARE_HISTORY
setopt HIST_IGNORE_ALL_DUPS
