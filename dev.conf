
# 开发环境エイリアス
export PYENV_ROOT="$HOME/.pyenv"
if [ -d "$PYENV_ROOT" ]; then
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)" 2>/dev/null
fi

cx() {
  nvm use 20 && command codex
}

alias gm="gemini"
alias ck="bash ${HOME}/dotfiles/aliases/scripts/claude2kimi/launch.sh"

alias zee="bash ${HOME}/dotfiles/plugins/zellij/zee"
export PATH="$HOME/.opencode/bin:$PATH"
alias oc="$HOME/.opencode/bin/opencode"

pve_win11(){
    if [ -z "$1" ]; then
      echo "Usage: pve_win11 <user:pass>"
      return 1
    fi
    local cred="$1"
    local user="${cred%%:*}"
    local pass="${cred#*:}"
    xfreerdp /v:192.168.3.65 \
      /u:"$user" /p:"$pass" \
      /drive:home,/home/tetsuya \
      /scale:180 \
      /dynamic-resolution \
      /clipboard
  }

pve_lmde7(){
    if [ -z "$1" ]; then
      echo "Usage: pve_lmde7 <user:pass>"
